[theme]
primaryColor = "#ff4b4b"
backgroundColor = "#0a0d14"
secondaryBackgroundColor = "#161b26"
textColor = "#f8f9fa"
font = "sans serif"

[server]
headless = true
enableCORS = false
enableXsrfProtection = false
maxUploadSize = 200
port = 8501

[browser]
gatherUsageStats = false
serverAddress = "localhost"
serverPort = 8501

[environment]
OPENCV_IO_ENABLE_OPENEXR = "1"
